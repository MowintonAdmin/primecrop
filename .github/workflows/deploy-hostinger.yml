name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'frontend/web/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Prepare deploy
        run: |
          mkdir -p ../../deploy-build
          cp -r dist/* ../../deploy-build/
          cp dist/.nojekyll ../../deploy-build/ 2>/dev/null || true

      - name: Deploy to hostinger branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy-build
          publish_branch: hostinger
          force_orphan: true