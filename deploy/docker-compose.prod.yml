services:
  db:
    image: postgres:15-alpine
    container_name: primecrop_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: primecrop_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./frontend/web
      args:
        VITE_API_URL: ""
    container_name: primecrop_web
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  admin:
    build: ./frontend/admin
    container_name: primecrop_admin
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
