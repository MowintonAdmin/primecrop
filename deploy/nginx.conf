server {
    listen 80;
    server_name theprimecrop.com www.theprimecrop.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name theprimecrop.com www.theprimecrop.com;

    ssl_certificate     /etc/letsencrypt/live/theprimecrop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theprimecrop.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # API
    location /api/ {
        proxy_pass http://primecrop_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files
    location /media/ {
        proxy_pass http://primecrop_backend:8000;
    }

    # Frontend storefront
    location / {
        proxy_pass http://primecrop_web:80;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name admin.theprimecrop.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.theprimecrop.com;

    ssl_certificate     /etc/letsencrypt/live/theprimecrop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theprimecrop.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://primecrop_admin:80;
        proxy_set_header Host $host;
    }
}
